{% extends 'portfolio/layout.html' %}
{% block content %}
<h2>Confirmar Eliminação</h2>
<p>Tem a certeza que deseja apagar?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-red">Sim, apagar</button>
    <a href="javascript:history.back()">Cancelar</a>
</form>
{% endblock %}
